<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Checkout</h1>
    <form id="checkoutForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <div id="minecraftHeadPreview" style="display:none;">
            <img id="headImage" src="" alt="Minecraft Head" />
        </div>
        <label for="itemsOrdered">Items Ordered:</label>
        <textarea id="itemsOrdered" name="itemsOrdered" required></textarea>
        <label for="totalPrice">Total Price:</label>
        <input type="number" id="totalPrice" name="totalPrice" required>
        <button type="submit">Checkout</button>
    </form>

    <div id="upiSection" style="display:none;">
        <h3>UPI QR Code</h3>
        <img id="upiQrCode" src="" alt="UPI QR Code" />
    </div>

    <script>
        $(document).ready(function() {
            $('#username').on('input', function() {
                // Validate username
                let username = $(this).val();
                // Assuming a function fetchMinecraftHead that gets the Minecraft head image
                fetchMinecraftHead(username);
            });

            $('#checkoutForm').on('submit', function(event) {
                event.preventDefault();
                let playerName = $('#username').val();
                let itemsOrdered = $('#itemsOrdered').val();
                let totalPrice = $('#totalPrice').val();
                // Generate UPI QR Code
                generateUpiQrCode(playerName, totalPrice);
            });
        });

        function fetchMinecraftHead(username) {
            // Fetch Minecraft head from an API
            $('#headImage').attr('src', `https://someapi.com/minecraft/head/${username}`);
            $('#minecraftHeadPreview').show();
        }

        function generateUpiQrCode(username, amount) {
            let qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?data=upi://pay?pa=${username}@bank&pn=${username}&mc=${amount}`;
            $('#upiQrCode').attr('src', qrCodeUrl);
            $('#upiSection').show();
            sendDiscordNotification(username, itemsOrdered, amount);
        }

        function sendDiscordNotification(playerName, itemsOrdered, totalPrice) {
            $.post('https://discord.com/api/webhooks/YOUR_WEBHOOK_URL', JSON.stringify({
                content: `New Order: Player Name: ${playerName}\nItems Ordered: ${itemsOrdered}\nTotal Price: ${totalPrice}`,
                username: "Order Bot"
            }), {
                contentType: 'application/json'
            });
        }
    </script>
</body>
</html>
